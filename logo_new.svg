<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#999999;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle (optional, can be removed for transparency) -->
  <!-- <circle cx="100" cy="100" r="95" fill="#f5f5f5" opacity="0.1"/> -->

  <!-- Robot Head Group -->
  <g id="robot-head">
    <!-- Main head shape (rounded square) -->
    <rect x="60" y="40" width="80" height="85" rx="12" ry="12" fill="url(#robotGradient)" stroke="#000000" stroke-width="1.5"/>
    
    <!-- Left Eye -->
    <circle cx="80" cy="65" r="10" fill="#ffffff"/>
    <circle cx="80" cy="65" r="6" fill="#000000"/>
    <circle cx="82" cy="63" r="2" fill="#ffffff"/>
    
    <!-- Right Eye -->
    <circle cx="120" cy="65" r="10" fill="#ffffff"/>
    <circle cx="120" cy="65" r="6" fill="#000000"/>
    <circle cx="122" cy="63" r="2" fill="#ffffff"/>
    
    <!-- Antenna Left -->
    <line x1="75" y1="35" x2="70" y2="15" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="70" cy="12" r="3" fill="#000000"/>
    
    <!-- Antenna Right -->
    <line x1="125" y1="35" x2="135" y2="15" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="135" cy="12" r="3" fill="#000000"/>
    
    <!-- Mouth (simple tech line) -->
    <rect x="80" y="95" width="40" height="3" rx="1.5" fill="#666666"/>
    
    <!-- Chin accent -->
    <line x1="70" y1="120" x2="130" y2="120" stroke="#666666" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Chat Bubble Group -->
  <g id="chat-bubble">
    <!-- Bubble background -->
    <path d="M 110 115 Q 155 110 155 140 Q 155 165 130 170 L 125 180 L 120 170 Q 95 172 90 155 Q 85 140 110 115 Z" fill="url(#chatGradient)" stroke="#333333" stroke-width="1.5"/>
    
    <!-- Chat lines (tech inspired) -->
    <line x1="100" y1="130" x2="145" y2="130" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="100" y1="142" x2="140" y2="142" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="100" y1="154" x2="130" y2="154" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Optional: Tech accent circles around the logo -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#cccccc" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,3"/>
</svg>