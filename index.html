`<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartTalk AI - Premium AI Chatbot">
    <meta name="theme-color" content="#000000">
    <title>SmartTalk AI - Chat Interface</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" aria-label="Start new chat" title="New Chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span class="btn-text">New Chat</span>
                </button>
            </div>
            <nav class="chat-history" id="chatHistory" role="navigation" aria-label="Chat history">
                <!-- Chat history items will be added here -->
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <div class="theme-toggle-content">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <span class="theme-label">Light</span>
                    </div>
                    <div class="theme-toggle-content dark">
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <span class="theme-label">Dark</span>
                    </div>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <!-- Header -->
            <header class="header" role="banner">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="header-title">SmartTalk AI</h1>
                <div class="header-spacer"></div>
            </header>

            <!-- Messages Container -->
            <section class="messages-wrapper">
                <div class="messages-container" id="messagesContainer" role="region" aria-label="Chat messages" aria-live="polite">
                    <!-- Welcome Message -->
                    <div class="welcome-section">
                        <div class="welcome-brand-row">
                            <img class="welcome-logo" src="logo_new.svg" alt="SmartTalk AI" width="34" height="34" />
                            <div class="welcome-brand">SmartTalk AI</div>
                        </div>
                        <p class="welcome-subtitle">Premium AI conversations, simplified.</p>
                    </div>
                </div>
            </section>

            <!-- Input Area - Sticky Bottom -->
            <div class="input-wrapper">
                <div class="input-area" role="region" aria-label="Message input area">
                    <div class="input-container">
                        <textarea 
                            id="userInput"
                            class="user-input"
                            placeholder="Message SmartTalk AI..."
                            aria-label="Type your message"
                            rows="1"
                            maxlength="4000"
                        ></textarea>
                        <button 
                            id="sendButton"
                            class="send-btn"
                            aria-label="Send message"
                            type="button"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                                <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16865563 C3.34915502,0.9115582 2.40734225,1.02269878 1.77946707,1.4939909 C0.994623095,2.17857697 0.837654326,3.27786881 1.15159189,3.99998954 L3.03521743,10.4409826 C3.03521743,10.59808 3.19218622,10.7551774 3.50612381,10.7551774 L16.6915026,11.5406642 C16.6915026,11.5406642 17.1624089,11.5406642 17.1624089,12.0119563 C17.1624089,12.4832485 16.6915026,12.4744748 16.6915026,12.4744748 Z"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="char-count" id="charCount"></p>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
