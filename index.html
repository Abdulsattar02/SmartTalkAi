<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTalk AI</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="font-inter">

<div class="flex flex-col h-screen">

    <!-- HEADER -->
    <header class="h-14 flex items-center px-4 border-b">
        <div class="flex items-center gap-2">
            <img src="logo_new.svg" class="w-8 h-8">
            <h1 class="font-bold text-lg">SmartTalk AI</h1>
        </div>
    </header>

    <!-- CHAT AREA -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto p-4">

        <!-- HERO -->
        <div class="text-center mt-10" id="heroSection">
            <img src="logo_new.svg" class="w-16 mx-auto mb-4">
            <h2 class="text-2xl font-bold">SmartTalk AI</h2>
        </div>

    </div>

    <!-- INPUT AREA -->
    <div class="p-4 border-t flex gap-2">

        <input 
            id="userInput"
            class="flex-1 border rounded-lg px-4 py-2 outline-none"
            placeholder="Type a message..."
        >

   <button id="sendButton"
    class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center transition-all duration-200">

    <svg xmlns="http://www.w3.org/2000/svg" 
         class="w-5 h-5" 
         fill="none" 
         viewBox="0 0 24 24" 
         stroke="currentColor" 
         stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7 7 7M12 3v18" />
    </svg>

</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
